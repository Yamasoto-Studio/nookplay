<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nookplay — El pasatiempo diario, en tu mesa{% endblock %}</title>

  <!-- Open Graph -->
  <meta property="og:site_name" content="Nookplay">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}Nookplay — El pasatiempo diario, en tu mesa{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Un caso nuevo cada día. ¿Puedes resolverlo antes de acabar el café?{% endblock %}">
  <meta property="og:image" content="https://nookplay.app/static/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://nookplay.app{% block og_url %}/{% endblock %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block tw_title %}Nookplay{% endblock %}">
  <meta name="twitter:description" content="{% block tw_description %}Un caso nuevo cada día. ¿Puedes resolverlo?{% endblock %}">
  <meta name="twitter:image" content="https://nookplay.app/static/og.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
