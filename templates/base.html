<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nookplay — El pasatiempo diario, en tu mesa{% endblock %}</title>

  <!-- Open Graph -->
  <meta property="og:site_name" content="Nookplay">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}Nookplay — El pasatiempo diario, en tu mesa{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Un caso nuevo cada día. ¿Puedes resolverlo antes de acabar el café?{% endblock %}">
  <meta property="og:image" content="https://nookplay.app/static/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://nookplay.app{% block og_url %}/{% endblock %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block tw_title %}Nookplay{% endblock %}">
  <meta name="twitter:description" content="{% block tw_description %}Un caso nuevo cada día. ¿Puedes resolverlo?{% endblock %}">
  <meta name="twitter:image" content="https://nookplay.app/static/og.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    /* Font size accessibility */
    html { font-size: 16px; }
    html.text-lg { font-size: 19px; }
    html.text-xl { font-size: 22px; }

    /* Rem-based scaling for key elements */
    .nook-card, .nook-card * { font-size: inherit; }
    .nook-title { font-size: 1.5rem !important; }
    .nook-sub { font-size: 1rem !important; }
    .menu-welcome { font-size: 1.1rem !important; }
    .body-text { font-size: 1rem !important; }
    .headline { font-size: 1.3rem !important; }
    .suspect-name { font-size: 1rem !important; }
    .suspect-role { font-size: 0.9rem !important; }
    .clue-btn { font-size: 1rem !important; }
    .activity-name { font-size: 1.05rem !important; }
    .activity-desc { font-size: 0.9rem !important; }
    .code-input { font-size: 1.2rem !important; }
    .code-hint { font-size: 0.88rem !important; }
    .btn-primary { font-size: 0.94rem !important; }
    .result-big { font-size: 1.9rem !important; }
    .result-sub { font-size: 1rem !important; }
    .reveal-name { font-size: 1.25rem !important; }
    .tomorrow { font-size: 0.88rem !important; }

    .a11y-toggle {
      position: fixed; bottom: 20px; right: 16px; z-index: 999;
      display: flex; align-items: center; gap: 6px;
      background: var(--bar-accent-dark, #1A0A2E);
      border-radius: 30px; padding: 8px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .a11y-btn {
      background: transparent; border: none;
      color: #fff; cursor: pointer; font-family: inherit;
      font-weight: 600; padding: 2px 6px; border-radius: 6px;
      font-size: 14px; line-height: 1; opacity: 0.6;
      transition: opacity 0.15s, background 0.15s;
    }
    .a11y-btn.active { opacity: 1; background: rgba(255,255,255,0.15); }
    .a11y-btn:hover { opacity: 1; }
    .a11y-sep { color: rgba(255,255,255,0.3); font-size: 12px; }
  </style>
  <script>
    // Restore font size preference
    const savedSize = localStorage.getItem('nookplay-textsize');
    if (savedSize) document.documentElement.classList.add(savedSize);
  </script>
</head>
<body>
  {% block content %}{% endblock %}
<div class="a11y-toggle" role="group" aria-label="Tamaño del texto">
  <button class="a11y-btn" id="txt-normal" onclick="setTextSize('normal')" aria-label="Texto normal">A</button>
  <span class="a11y-sep">|</span>
  <button class="a11y-btn" id="txt-lg" onclick="setTextSize('text-lg')" aria-label="Texto grande" style="font-size:17px;">A</button>
  <span class="a11y-sep">|</span>
  <button class="a11y-btn" id="txt-xl" onclick="setTextSize('text-xl')" aria-label="Texto muy grande" style="font-size:20px;">A</button>
</div>

<script>
function setTextSize(size) {
  document.documentElement.classList.remove('text-lg', 'text-xl');
  if (size !== 'normal') document.documentElement.classList.add(size);
  localStorage.setItem('nookplay-textsize', size === 'normal' ? '' : size);
  updateA11yBtns();
}

function updateA11yBtns() {
  const current = document.documentElement.classList.contains('text-xl') ? 'text-xl'
    : document.documentElement.classList.contains('text-lg') ? 'text-lg' : 'normal';
  document.querySelectorAll('.a11y-btn').forEach(btn => btn.classList.remove('active'));
  const map = { 'normal': 'txt-normal', 'text-lg': 'txt-lg', 'text-xl': 'txt-xl' };
  const el = document.getElementById(map[current]);
  if (el) el.classList.add('active');
}

document.addEventListener('DOMContentLoaded', updateA11yBtns);
</script>
</body>
</html>
