{% extends "base.html" %}
{% block title %}Nookplay — El pasatiempo diario del bar{% endblock %}
{% block content %}
<div class="nook home">
  <div class="nook-logo-wrap">
    <img src="/static/logo.svg" alt="Nookplay">
  </div>
  <p class="nook-sub">El pasatiempo diario,<br>en tu mesa.</p>
  <hr class="divider" style="margin: 28px 0;">
  <p style="font-size:13px;color:var(--text-muted);text-align:center;">
    ¿Tienes un bar y quieres ofrecer Nookplay?<br>
    <a href="mailto:hola@nookplay.app" style="color:var(--brand);">hola@nookplay.app</a>
  </p>
  <div class="nook-footer" style="margin-top:32px;">
    <span>by Yamasoto</span>
  </div>
</div>
{% endblock %}
