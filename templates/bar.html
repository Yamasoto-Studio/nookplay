{% extends "base.html" %}
{% block title %}{{ bar.name }} — Nookplay{% endblock %}
{% block content %}

<style>
  :root {
    --bar-primary: {{ bar.color_primary }};
    --bar-primary-text: {{ bar.color_primary_text }};
    --bar-bg: {{ bar.color_bg }};
    --bar-bg-card: #FFFFFF;
    --bar-bg-subtle: {{ bar.color_bg_subtle }};
    --bar-accent-dark: {{ bar.color_accent_dark }};
  }
</style>

<div class="nook">

  <div class="nook-topbar">
    <a href="/"><img src="/static/logo.svg" alt="Nookplay"></a>
  </div>

  <div class="bar-hero">
    <img class="bar-hero-logo" src="/static/clientes/{{ bar.slug }}/logo_header.png" alt="{{ bar.name }}" onerror="this.style.display='none'">
  </div>

  <div class="nook-content">
    <div class="nook-card">

      <!-- PANTALLA: CÓDIGO -->
      <div class="screen active" id="s-code">
        <h1 class="nook-title">Disfruta del Pasatiempo<br>del Día</h1>
        <p class="nook-sub">Introduce el código de tu tarjeta para acceder al juego de hoy.</p>
        <div class="code-input-wrap">
          <input type="text" id="code-input" class="code-input" placeholder="YELLOW01" maxlength="10" autocomplete="off" autocapitalize="characters">
          <div class="code-error" id="code-error"></div>
        </div>
        <button class="btn-primary" onclick="validateCode()">Entrar</button>
        <p class="code-hint">El código está impreso en tu tarjeta.</p>
      </div>

      <!-- PANTALLA: MENÚ DE ACTIVIDADES -->
      <div class="screen" id="s-menu">
        <p class="menu-welcome" id="menu-welcome"></p>
        <div class="section-label" style="margin-bottom: 12px;">Elige tu pasatiempo</div>
        <div id="activities-list"></div>
      </div>

      <!-- PANTALLA: JUEGO -->
      <div class="screen" id="s-game"></div>

    </div>
  </div>

  <div class="nook-footer">
    <a href="/" class="nook-footer-brand"><img src="/static/logo.svg" alt="Nookplay"></a>
    <a href="https://www.yamasoto.com/" target="_blank" class="nook-footer-by">by Yamasoto</a>
  </div>

</div>

<script>
const BAR_SLUG = "{{ bar.slug }}";
const BAR_NAME = "{{ bar.name }}";
const BAR_WELCOME = "{{ bar.welcome_message }}";
let validatedCode = null;
let currentGame = null;

// Check if code is already in URL (returning from a game)
const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get('code');
if (urlCode) {
  validatedCode = urlCode;
  // Show menu directly without asking for code again
  window.addEventListener('DOMContentLoaded', () => showMenu());
}

const ACTIVITIES = [
  {
    id: 'crimen',
    name: 'El Crimen del Día',
    desc: 'Resuelve un misterio en el tiempo de un café',
    icon: '🔍',
    active: true
  },
  {
    id: 'impostor',
    name: 'El Impostor',
    desc: 'Cuatro datos. Uno es mentira. ¿Cuál?',
    icon: '🕵️',
    active: true
  },
  {
    id: 'horoscopo',
    name: 'Tu Horóscopo',
    desc: 'Las estrellas tienen algo que decirte hoy',
    icon: '♊',
    active: false
  },
  {
    id: 'donde',
    name: '¿Dónde en el mundo?',
    desc: 'Adivina el lugar a partir de una foto',
    icon: '🌍',
    active: false
  }
];

async function validateCode() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const errorEl = document.getElementById('code-error');
  errorEl.textContent = '';
  if (!code) { errorEl.textContent = 'Introduce tu código.'; return; }

  const btn = document.querySelector('#s-code .btn-primary');
  btn.textContent = 'Comprobando...';
  btn.disabled = true;

  const res = await fetch('/api/validate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, bar_slug: BAR_SLUG })
  });
  const data = await res.json();

  if (data.valid) {
    validatedCode = code;
    showMenu();
  } else {
    errorEl.textContent = data.message;
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') validateCode();
});

function showMenu() {
  const welcome = BAR_WELCOME || `Bienvenido al ${BAR_NAME}. Elige tu pasatiempo de hoy.`;
  document.getElementById('menu-welcome').textContent = welcome;

  const list = document.getElementById('activities-list');
  list.innerHTML = ACTIVITIES.map(a => `
    <div class="activity-card ${a.active ? '' : 'activity-dim'}" ${a.active ? `onclick="startActivity('${a.id}')"` : ''}>
      <div class="activity-icon">${a.icon}</div>
      <div class="activity-info">
        <div class="activity-name">${a.name}</div>
        <div class="activity-desc">${a.desc}</div>
      </div>
      ${a.active
        ? '<div class="activity-badge">Hoy</div>'
        : '<div class="activity-badge activity-badge-dim">Próximamente</div>'
      }
    </div>
  `).join('');

  showScreen('s-menu');
}

function startActivity(id) {
  if (id === 'crimen') loadGame();
  if (id === 'impostor') window.location = `/${BAR_SLUG}/impostor?code=${validatedCode}`;
}

async function loadGame() {
  showScreen('s-game');
  document.getElementById('s-game').innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Preparando el caso de hoy...</p>
    </div>`;

  try {
    const res = await fetch('/api/game', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: validatedCode, bar_slug: BAR_SLUG })
    });
    currentGame = await res.json();
    renderGame(currentGame);
  } catch(e) {
    document.getElementById('s-game').innerHTML = `
      <div class="error-msg">
        <p>No se pudo cargar el juego.</p>
        <button class="btn-secondary" onclick="showMenu()">Volver</button>
      </div>`;
  }
}

function renderGame(g) {
  const el = document.getElementById('s-game');
  el.innerHTML = `
    <button class="btn-back" onclick="showMenu()">← Volver al menú</button>
    <span class="tag">Caso del día</span>
    <h2 class="headline" id="g-titular"></h2>
    <p class="location">📍 <span id="g-lugar"></span></p>
    <hr class="divider">
    <p class="body-text" id="g-intro"></p>
    <hr class="divider">
    <div class="section-label">Pistas — toca para revelar</div>
    ${g.pistas.map((p,i) => `
      <button class="clue-btn" id="c${i}" onclick="revealClue(${i}, this)">
        <span class="clue-icon">🔒</span>
        <span class="clue-text">Pista ${i+1} — toca para revelar</span>
      </button>
    `).join('')}
    <hr class="divider">
    <div class="section-label">Sospechosos</div>
    ${g.sospechosos.map((s,i) => `
      <button class="suspect-btn" id="sp${i}" onclick="pickSuspect(${i})">
        <div class="suspect-avatar" id="av${i}"></div>
        <div>
          <div class="suspect-name" id="sn${i}"></div>
          <div class="suspect-role" id="sr${i}"></div>
        </div>
      </button>
    `).join('')}
    <button class="btn-danger" id="accuse-btn" disabled onclick="accuse()">
      🔨 Acusar al culpable
    </button>
  `;

  document.getElementById('g-titular').textContent = g.titular;
  document.getElementById('g-lugar').textContent = g.lugar;
  document.getElementById('g-intro').textContent = g.introduccion;
  g.sospechosos.forEach((s, i) => {
    const initials = s.nombre.split(' ').map(w => w.charAt(0)).slice(0,2).join('');
    document.getElementById('av' + i).textContent = initials;
    document.getElementById('sn' + i).textContent = s.nombre;
    document.getElementById('sr' + i).textContent = s.descripcion;
  });
  window._selected = -1;
}

function revealClue(i, el) {
  if (el.classList.contains('revealed')) return;
  el.classList.add('revealed');
  el.querySelector('.clue-icon').textContent = '👁️';
  el.querySelector('.clue-text').textContent = currentGame.pistas[i];
}

function pickSuspect(idx) {
  document.querySelectorAll('.suspect-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('sp' + idx).classList.add('selected');
  window._selected = idx;
  document.getElementById('accuse-btn').disabled = false;
}

async function accuse() {
  if (window._selected === -1 || !currentGame) return;
  const correct = window._selected === currentGame.culpable;
  const culpableName = currentGame.sospechosos[currentGame.culpable].nombre;
  const accusedName = currentGame.sospechosos[window._selected].nombre;

  await fetch('/api/play', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: validatedCode, bar_slug: BAR_SLUG, correct })
  });

  const el = document.getElementById('s-game');
  el.innerHTML = `
    <div class="result-big ${correct ? 'correct' : 'wrong'}" id="r-headline"></div>
    <p class="result-sub" id="r-sub"></p>
    <div class="reveal-card">
      <div class="reveal-label">El culpable</div>
      <div class="reveal-name" id="r-culpable"></div>
    </div>
    <p class="body-text" id="r-explicacion"></p>
    <button class="btn-share" onclick="shareResult()">📤 Compartir resultado</button>
    <button class="btn-menu" onclick="goToMenu()">← Volver al menú</button>
    <div class="tomorrow">Mañana hay un caso nuevo aquí.<br>Vuelve a tomar un café.</div>
  `;

  document.getElementById('r-headline').textContent = correct ? 'Caso resuelto.' : 'Fallaste.';
  document.getElementById('r-sub').textContent = correct ? 'Acertaste. Buen detective.' : 'Te equivocaste. Acusaste a ' + accusedName + '.';
  document.getElementById('r-culpable').textContent = culpableName;
  document.getElementById('r-explicacion').textContent = currentGame.explicacion;
}

function shareResult() {
  const correct = window._selected === currentGame.culpable;
  const accusedName = currentGame.sospechosos[window._selected].nombre;
  const culpableName = currentGame.sospechosos[currentGame.culpable].nombre;
  const emoji = correct ? '✅' : '❌';
  const txt = `🔍 El Crimen del Día — ${BAR_NAME}\n\n${emoji} Acusé a ${accusedName}\nEl culpable era: ${culpableName}\n\n¿Puedes tú resolverlo?\nnookplay.app`;
  if (navigator.share) { navigator.share({ text: txt }); }
  else { navigator.clipboard.writeText(txt).then(() => alert('¡Copiado!')); }
}

function goToMenu() {
  // Update URL with code so menu shows directly on return
  const newUrl = `/${BAR_SLUG}?code=${validatedCode}`;
  window.history.replaceState({}, '', newUrl);
  showMenu();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

{% endblock %}
